{% extends 'base.html' %}

{% block content %}
    <!-- Header-->
    <header class="bg-dark py-5">
        <div class="container px-4 px-lg-5 my-5">
            <div class="text-center text-white">
                <h1 class="display-4 fw-bolder">Update Info</h1>
                <p class="lead fw-normal text-white-50 mb-0">Keep your info up to date</p>
            </div>
        </div>
    </header>

    <div class="container py-5">
        <div class="col-md-6 offset-md-3">
            <form method="post" action="{% url 'update_info' %}">
                {% csrf_token %}

                <!-- Personal Info -->
                <h5 class="fw-bolder mb-3">👤 Personal Info</h5>
                {{ form.as_p }}

                <hr class="my-4">

                <!-- Shipping Info -->
                <h5 class="fw-bolder mb-3">📦 Shipping Address</h5>
                {{ shipping_form.as_p }}

                <br/>
                <button type="submit" class="btn btn-dark px-5">Save Changes</button>
            </form>
            <br/><br/><br/>
        </div>
    </div>

{% endblock %}
