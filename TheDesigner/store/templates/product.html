{% extends 'base.html' %}

{% block content %}

    <header class="bg-dark py-5">
        <div class="container px-4 px-lg-5 my-5">
            <div class="text-center text-white">
                <h1 class="display-4 fw-bolder">{{ product.name }}</h1>
                <p class="lead fw-normal text-white-50 mb-0">Product Details</p>
            </div>
        </div>
    </header>

    <section class="py-5">
        <div class="container px-4 px-lg-5">
            <div class="row gx-5 align-items-center">

                <div class="col-md-5 text-center mb-4 mb-md-0">
                    <img src="{{ product.image.url }}" class="img-fluid rounded shadow" alt="{{ product.name }}">
                </div>

                <div class="col-md-7">
                    <h2 class="fw-bolder mb-3">{{ product.name }}</h2>
                    <p class="text-muted mb-4">{{ product.description }}</p>

                    <div class="mb-4">
                        {% if product.is_sale %}
                            <span class="d-inline-flex align-items-center gap-2 mb-1">
                                <span class="badge bg-danger">Sale!</span>
                            </span>
                            <div>
                                <span class="text-muted text-decoration-line-through fs-5">${{ product.price }}</span>
                                <span class="fw-bolder fs-4 text-dark ms-2">${{ product.sale_Price }}</span>
                            </div>
                        {% else %}
                            <span class="fw-bolder fs-4">${{ product.price }}</span>
                        {% endif %}
                        <br/><br/>
                        <div class="row justify-content-center">
                            <div class="col-md-2"> Quantity</div>
                            <div class="col-md-2">
                                <select class="form-select form-select-sm"  id="qty-cart">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="3">4</option>
                                    <option value="3">5</option>
                                </select>
                            </div> 
                        </div>
                        <br/><br/>
                    </div>

                    <a href="{% url 'home' %}" class="btn btn-secondary px-4">← Back to Home</a>
                    <button type="button" value="{{ product.id }}" class="btn btn-secondary" id="add-cart">Add to Cart</button>
                </div>

            </div>
        </div>
    </section>

<script>
    $(document).on('click', '#add-cart', function(e){
        e.preventDefault();
        $.ajax({
            type: 'POST',
            url: '{% url "cart_add" %}',
            data: {
                product_id: $('#add-cart').val(),
                product_qty:$('#qty-cart option:selected').text(),
                csrfmiddlewaretoken: '{{ csrf_token }}',
                action: 'post'
            },
            success: function(json){
                document.getElementById("cart_quantity").textContent = json.qty;
                location.reload();
            },
            error: function(xhr, errmsg, err){
                console.log(errmsg);
            }
        });
    })
</script>
{% endblock %}
