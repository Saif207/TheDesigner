{% extends 'base.html' %}

{% block content %}

    <!-- Header -->
    <header class="bg-dark py-5">
        <div class="container px-4 px-lg-5 my-5">
            <div class="text-center text-white">
                <h1 class="display-4 fw-bolder">{{ product.name }}</h1>
                <p class="lead fw-normal text-white-50 mb-0">Product Details</p>
            </div>
        </div>
    </header>

    <section class="py-5">
        <div class="container px-4 px-lg-5">
            <div class="row gx-5 align-items-center">

                <!-- Product Image -->
                <div class="col-md-5 text-center mb-4 mb-md-0">
                    <img src="{{ product.image.url }}" class="img-fluid rounded shadow" alt="{{ product.name }}">
                </div>

                <!-- Product Info -->
                <div class="col-md-7">
                    <h2 class="fw-bolder mb-3">{{ product.name }}</h2>
                    <p class="text-muted mb-4">{{ product.description }}</p>

                    <!-- Price -->
                    <div class="mb-4">
                        {% if product.is_sale %}
                            <span class="d-inline-flex align-items-center gap-2 mb-1">
                                <span class="badge bg-danger">Sale!</span>
                            </span>
                            <div>
                                <span class="text-muted text-decoration-line-through fs-5">${{ product.price }}</span>
                                <span class="fw-bolder fs-4 text-dark ms-2">${{ product.sale_Price }}</span>
                            </div>
                        {% else %}
                            <span class="fw-bolder fs-4">${{ product.price }}</span>
                        {% endif %}
                    </div>

                    <!-- Actions -->
                    <a href="{% url 'home' %}" class="btn btn-secondary px-4">← Back to Home</a>
                </div>

            </div>
        </div>
    </section>

{% endblock %}
